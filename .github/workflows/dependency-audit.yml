# Dependency Vulnerability Scanner
# 1. npm audit — checks installed packages against the GitHub Advisory Database
# 2. dependency-review — blocks PRs that introduce known-vulnerable dependencies

name: "Dependency Vulnerability Audit"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (production deps only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

      - name: Run npm audit (all deps — advisory)
        run: npm audit --audit-level=moderate
        continue-on-error: true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0
          comment-summary-in-pr: always
