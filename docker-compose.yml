# NanoClaw Service Mesh
# Monolith runs on host. Extracted services run in Docker.
#
# Option B architecture:
# - Monolith (host) = DB + message loop + scheduler + channels
# - WhatsApp Gateway (Docker) = Baileys WebSocket (has real boundary)
# - Agent Runner (Docker) = stateless container executor (can scale)
#
# Usage:
#   docker compose up -d          # start services
#   docker compose down           # stop services

services:
  # ─── WhatsApp Gateway ───
  whatsapp-gateway:
    build: ./services/whatsapp-gateway
    container_name: nanoclaw-whatsapp-gateway
    restart: unless-stopped
    ports:
      - "${WHATSAPP_GATEWAY_PORT:-4002}:4002"
    environment:
      - API_GATEWAY_URL=http://host.docker.internal:${CORE_API_PORT:-4001}
      - ASSISTANT_NAME=${ASSISTANT_NAME:-Andy}
      - ASSISTANT_HAS_OWN_NUMBER=${ASSISTANT_HAS_OWN_NUMBER:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./store/auth:/app/store/auth
    networks:
      - nanoclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Agent Runner (stateless) ───
  agent-runner:
    build: ./services/agent-runner
    container_name: nanoclaw-agent-runner
    restart: unless-stopped
    ports:
      - "${AGENT_RUNNER_PORT:-4005}:4005"
    environment:
      - PROJECT_ROOT=/app/project
      - ASSISTANT_NAME=${ASSISTANT_NAME:-Andy}
      - CONTAINER_IMAGE=${CONTAINER_IMAGE:-nanoclaw-agent:latest}
      - CONTAINER_TIMEOUT=${CONTAINER_TIMEOUT:-1800000}
      - CREDENTIAL_PROXY_PORT=${CREDENTIAL_PROXY_PORT:-3001}
      - HOST_GATEWAY=host.docker.internal
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TZ=${TZ:-UTC}
    volumes:
      # Project root — for container mount operations
      - .:/app/project:rw
      # Docker socket — for spawning agent containers
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nanoclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Observability (optional) ───
  prometheus:
    image: prom/prometheus:latest
    container_name: nanoclaw-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - nanoclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: nanoclaw-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=***
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - nanoclaw

volumes:
  prometheus-data:
  grafana-data:

networks:
  nanoclaw:
    driver: bridge
