# NanoClaw Observability Stack
# Prometheus + Grafana + Loki for metrics, dashboards, and log aggregation.
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose down           # stop all services
#   docker compose down -v        # stop and remove data volumes
#
# NanoClaw runs on the host (not in Docker). The Prometheus container
# scrapes the host metrics endpoint via host.docker.internal.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: nanoclaw-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - nanoclaw-observability
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:latest
    container_name: nanoclaw-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - nanoclaw-observability

  grafana:
    image: grafana/grafana-oss:latest
    container_name: nanoclaw-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=nanoclaw
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/operational-overview.json
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - nanoclaw-observability

volumes:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  nanoclaw-observability:
    driver: bridge
