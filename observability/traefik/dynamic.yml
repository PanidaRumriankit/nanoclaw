# Traefik Dynamic Configuration
# Routes incoming requests to the appropriate NanoClaw service.

http:
  routers:
    # API Gateway — handles all /api/v1/* routes
    api-gateway:
      rule: "PathPrefix(`/api/v1`)"
      service: api-gateway
      entryPoints:
        - web

    # Orchestrator — direct access for internal health checks
    orchestrator:
      rule: "PathPrefix(`/orchestrator`)"
      service: orchestrator
      entryPoints:
        - web

    # Scheduler — direct access for internal health checks
    scheduler:
      rule: "PathPrefix(`/scheduler`)"
      service: scheduler
      entryPoints:
        - web

    # WhatsApp Gateway — direct access for health checks
    whatsapp-gateway:
      rule: "PathPrefix(`/whatsapp`)"
      service: whatsapp-gateway
      entryPoints:
        - web

  services:
    api-gateway:
      loadBalancer:
        servers:
          - url: "http://nanoclaw-api-gateway:4000"

    orchestrator:
      loadBalancer:
        servers:
          - url: "http://nanoclaw-orchestrator:4003"

    scheduler:
      loadBalancer:
        servers:
          - url: "http://nanoclaw-scheduler:4004"

    whatsapp-gateway:
      loadBalancer:
        servers:
          - url: "http://nanoclaw-whatsapp-gateway:4002"
